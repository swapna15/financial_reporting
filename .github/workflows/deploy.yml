name: Deploy

on:
  push:
    branches: [main]

# Streamlit Community Cloud auto-deploys from GitHub on every push to main.
# No additional CI steps are required.
jobs:
  notify:
    name: Deployment triggered
    runs-on: ubuntu-latest
    steps:
      - name: Confirm push received
        run: echo "Push to main received. Streamlit Community Cloud will auto-deploy."
